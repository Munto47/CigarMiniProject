name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cigar
          POSTGRES_PASSWORD: cigar_pass
          POSTGRES_DB: cigar_db
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: pnpm/action-setup@v2
        with: { version: '9' }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://cigar:cigar_pass@localhost:5432/cigar_db?schema=public

      - name: Run migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://cigar:cigar_pass@localhost:5432/cigar_db?schema=public

      - name: Test
        run: pnpm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://cigar:cigar_pass@localhost:5432/cigar_db?schema=public
          JWT_ACCESS_SECRET: ci_test_secret_key
          JWT_REFRESH_SECRET: ci_refresh_secret_key
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build
        run: pnpm build
