version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cigar_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: cigar
      POSTGRES_PASSWORD: cigar_pass
      POSTGRES_DB: cigar_db
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cigar -d cigar_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cigar_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_pass --save 60 1
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cigar_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: cigar_minio
      MINIO_ROOT_PASSWORD: minio_pass123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_data:
  redis_data:
  minio_data:
