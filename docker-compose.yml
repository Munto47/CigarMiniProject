version: '3.9'

# ============================================================
# CigarPro 生产环境 Docker Compose
# 使用前：复制 .env.production.example → .env 并填入真实配置
# 启动：docker compose up -d --build
# ============================================================

services:

  # ── 基础设施层 ──────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: cigar_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - cigar_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cigar_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - cigar_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cigar_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO 控制台（可选，按需暴露）
    networks:
      - cigar_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 应用层 ──────────────────────────────────────────────────

  server:
    build:
      context: ./Cigar_server
      dockerfile: Dockerfile
    container_name: cigar_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV:         production
      PORT:             3000
      API_PREFIX:       api

      DATABASE_URL:     "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"

      REDIS_HOST:       redis
      REDIS_PORT:       6379
      REDIS_PASSWORD:   ${REDIS_PASSWORD}

      JWT_ACCESS_SECRET:          ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:         ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_ADMIN:   ${JWT_ACCESS_EXPIRES_ADMIN:-2h}
      JWT_ACCESS_EXPIRES_USER:    ${JWT_ACCESS_EXPIRES_USER:-30m}
      JWT_REFRESH_EXPIRES:        ${JWT_REFRESH_EXPIRES:-7d}

      ADMIN_LOGIN_MAX_ATTEMPTS:   ${ADMIN_LOGIN_MAX_ATTEMPTS:-5}
      ADMIN_LOGIN_LOCK_MINUTES:   ${ADMIN_LOGIN_LOCK_MINUTES:-15}

      MINIO_ENDPOINT:   minio
      MINIO_PORT:       9000
      MINIO_USE_SSL:    "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET:     ${MINIO_BUCKET:-cigar-assets}

      WECHAT_APP_ID:      ${WECHAT_APP_ID}
      WECHAT_APP_SECRET:  ${WECHAT_APP_SECRET}
      WECHAT_MOCK_MODE:   "false"

      WECHAT_MCH_ID:                ${WECHAT_MCH_ID}
      WECHAT_API_V3_KEY:            ${WECHAT_API_V3_KEY}
      WECHAT_SERIAL_NO:             ${WECHAT_SERIAL_NO}
      WECHAT_NOTIFY_URL:            ${WECHAT_NOTIFY_URL}
      WECHAT_MERCHANT_PRIVATE_KEY:  ${WECHAT_MERCHANT_PRIVATE_KEY}
      WECHAT_PLATFORM_CERT:         ${WECHAT_PLATFORM_CERT}

      VOICE_ASR_MOCK:       ${VOICE_ASR_MOCK:-false}
      TENCENT_SECRET_ID:    ${TENCENT_SECRET_ID}
      TENCENT_SECRET_KEY:   ${TENCENT_SECRET_KEY}
      TENCENT_ASR_REGION:   ${TENCENT_ASR_REGION:-ap-guangzhou}

      METRICS_API_KEY:  ${METRICS_API_KEY}
      ENCRYPTION_KEY:   ${ENCRYPTION_KEY}
    networks:
      - cigar_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  admin:
    build:
      context: ./Cigar_admin
      dockerfile: Dockerfile
    container_name: cigar_admin
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-80}:80"
    networks:
      - cigar_net

# ── 持久化卷 ────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  minio_data:

# ── 内部网络 ────────────────────────────────────────────────
networks:
  cigar_net:
    driver: bridge
